<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurashtra Plastics | Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top topbar py-2">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Saurashtra Plastics</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
                </ul>
                <form class="search-pill d-flex mx-lg-4 my-3 my-lg-0 flex-grow-1">
                    <input class="form-control" type="search" placeholder="Search all products...">
                    <button class="btn btn-primary px-3" type="button"><i
                            class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <div class="d-flex gap-2 align-items-center">
                    <a href="cart.html" class="btn btn-outline-primary position-relative active">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cartCount"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <a href="auth.html" class="btn btn-primary">Login / Register</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="section-space pt-4">
        <div class="container">
            <h2 class="fw-bold mb-4">Shopping Cart</h2>
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="content-panel p-2 p-md-3">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Price</th>
                                        <th>Qty</th>
                                        <th>Total</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="cartItemsContainer"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="content-panel p-4">
                        <h5 class="fw-semibold mb-3">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><strong
                                id="cartSubtotal">₹0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>Shipping</span><strong
                                id="cartShipping">₹0</strong></div>
                        <hr>
                        <div class="d-flex justify-content-between fs-5 mb-4"><span>Total</span><strong
                                id="cartTotal">₹0</strong></div>
                        <a href="checkout.html" class="btn btn-primary w-100 btn-lg">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="liveToastWrap"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
