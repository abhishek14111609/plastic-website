<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saurashtra Plastics | Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top topbar py-2">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Saurashtra Plastics</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-lg-3 mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
                </ul>
                <form class="search-pill d-flex mx-lg-4 my-3 my-lg-0 flex-grow-1">
                    <input class="form-control" type="search" placeholder="Search all products...">
                    <button class="btn btn-primary px-3" type="button"><i
                            class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <div class="d-flex gap-2 align-items-center">
                    <a href="cart.html" class="btn btn-outline-primary position-relative">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cartCount"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <a href="auth.html" class="btn btn-primary">Login / Register</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="section-space pt-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="fw-bold mb-0">Marketplace Products</h2>
                <p class="text-secondary mb-0">Find industrial plastic products by category and budget</p>
            </div>

            <div class="row g-4">
                <div class="col-lg-3">
                    <div class="content-panel p-3 sidebar-filter">
                        <h5 class="fw-semibold mb-3">Filters</h5>
                        <div class="mb-3">
                            <label for="filterCategory" class="form-label">Category</label>
                            <select id="filterCategory" class="form-select">
                                <option value="all">All Categories</option>
                                <option value="Pipes">Pipes</option>
                                <option value="Containers">Containers</option>
                                <option value="Packaging">Packaging</option>
                                <option value="Fittings">Fittings</option>
                                <option value="Logistics">Logistics</option>
                                <option value="Tanks">Tanks</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Raw Material">Raw Material</option>
                                <option value="Utility">Utility</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="filterPrice" class="form-label">Max Price: <strong
                                    id="priceRangeLabel">₹5,000</strong></label>
                            <input id="filterPrice" type="range" class="form-range" min="200" max="5000" step="100"
                                value="5000">
                        </div>
                        <div class="mb-1">
                            <label for="sortPrice" class="form-label">Sort</label>
                            <select id="sortPrice" class="form-select">
                                <option value="default">Default</option>
                                <option value="low-high">Price: Low to High</option>
                                <option value="high-low">Price: High to Low</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-lg-9">
                    <div class="row g-4" id="productsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="liveToastWrap"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
